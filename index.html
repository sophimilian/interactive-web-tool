<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="flashcards.css" />
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-left">
      <h1>Flash<span>cards</span></h1>
      <span class="deck-count" id="deckCount">0 cards</span>
    </div>
    <button class="btn-theme" id="btnTheme" title="Toggle dark mode">🌙</button>
  </header>

  <!-- Add Form -->
  <div class="add-form">
    <h2>New Card</h2>
    <div class="form-row">
      <input type="text" id="inputFront" placeholder="Question / term" />
      <input type="text" id="inputBack"  placeholder="Answer / definition" />
    </div>
    <button class="btn-add" id="btnAdd">+ Add Card</button>
  </div>

  <!-- Empty state -->
  <div class="empty-state visible" id="emptyState">
    <span class="big">✦</span>
    Add your first card above<br>to start studying.
  </div>

  <!-- Card Viewer -->
  <div class="viewer" id="viewer">

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressLabel">0% known</span>
        <span class="known-badge" id="knownBadge"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-row">
      Show:
      <button class="btn-filter active" data-filter="all">All</button>
      <button class="btn-filter" data-filter="unknown">Still learning</button>
      <button class="btn-filter" data-filter="known">Known ✓</button>
    </div>

    <div class="card-counter" id="cardCounter">Card 1 of 1</div>

    <div class="card-scene" id="cardScene">
      <div class="card-inner">
        <div class="card-face card-front">
          <span class="card-label">Question</span>
          <p class="card-text" id="cardFrontText"></p>
          <span class="card-hint">click to flip</span>
        </div>
        <div class="card-face card-back">
          <span class="card-label">Answer</span>
          <p class="card-text" id="cardBackText"></p>
          <span class="card-hint">click to flip back</span>
        </div>
      </div>
    </div>

    <div class="known-row">
      <button class="btn-known" id="btnKnown">✓ Mark as Known</button>
    </div>

    <div class="nav-row">
      <button class="btn-nav" id="btnPrev">← Prev</button>
      <button class="btn-nav shuffle" id="btnShuffle">⇄ Shuffle</button>
      <button class="btn-nav" id="btnNext">Next →</button>
      <button class="btn-nav reset" id="btnReset">↺ Reset</button>
    </div>

    <p class="kb-hint">← → arrow keys to navigate · space to flip · K to mark known</p>
  </div>

  <!-- Card List -->
  <div class="list-section" id="listSection">
    <div class="list-header">
      <h2>Your Deck</h2>
      <button class="btn-reveal-toggle" id="btnRevealToggle">👁 Reveal answers</button>
    </div>
    <div class="card-list" id="cardList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let cards = [];           // [{front, back, known}]
  let currentIndex = 0;
  let isFlipped = false;
  let activeFilter = 'all'; // 'all' | 'unknown' | 'known'
  let answersRevealed = false;

  // ── Elements ──
  const inputFront      = document.getElementById('inputFront');
  const inputBack       = document.getElementById('inputBack');
  const btnAdd          = document.getElementById('btnAdd');
  const btnPrev         = document.getElementById('btnPrev');
  const btnNext         = document.getElementById('btnNext');
  const btnShuffle      = document.getElementById('btnShuffle');
  const btnReset        = document.getElementById('btnReset');
  const btnKnown        = document.getElementById('btnKnown');
  const btnTheme        = document.getElementById('btnTheme');
  const btnRevealToggle = document.getElementById('btnRevealToggle');
  const cardScene       = document.getElementById('cardScene');
  const cardFrontTxt    = document.getElementById('cardFrontText');
  const cardBackTxt     = document.getElementById('cardBackText');
  const cardCounter     = document.getElementById('cardCounter');
  const deckCount       = document.getElementById('deckCount');
  const progressFill    = document.getElementById('progressFill');
  const progressLabel   = document.getElementById('progressLabel');
  const knownBadge      = document.getElementById('knownBadge');
  const emptyState      = document.getElementById('emptyState');
  const viewer          = document.getElementById('viewer');
  const cardList        = document.getElementById('cardList');
  const listSection     = document.getElementById('listSection');
  const toastEl         = document.getElementById('toast');
  const filterBtns      = document.querySelectorAll('.btn-filter');

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
  }

  // ── Filtered deck ──
  function getFiltered() {
    if (activeFilter === 'known')   return cards.filter(c => c.known);
    if (activeFilter === 'unknown') return cards.filter(c => !c.known);
    return cards;
  }

  // ── Render ──
  function render() {
    const total = cards.length;
    const knownCount = cards.filter(c => c.known).length;
    deckCount.textContent = total + (total === 1 ? ' card' : ' cards');

    if (total === 0) {
      emptyState.classList.add('visible');
      viewer.classList.remove('visible');
      listSection.style.display = 'none';
      return;
    }

    emptyState.classList.remove('visible');
    viewer.classList.add('visible');
    listSection.style.display = 'block';

    // progress bar
    const pct = Math.round((knownCount / total) * 100);
    progressFill.style.width = pct + '%';
    progressFill.classList.toggle('all-known', knownCount === total && total > 0);
    progressLabel.textContent = pct + '% known';
    knownBadge.textContent = knownCount > 0 ? `${knownCount} / ${total} ✓` : '';

    // filtered view
    const filtered = getFiltered();

    if (filtered.length === 0) {
      cardCounter.textContent = 'No cards match this filter.';
      cardFrontTxt.textContent = '';
      cardBackTxt.textContent  = '';
      cardScene.classList.remove('flipped', 'is-known');
      btnPrev.disabled = true;
      btnNext.disabled = true;
      btnKnown.style.visibility = 'hidden';
      renderList();
      return;
    }

    btnKnown.style.visibility = 'visible';

    if (currentIndex >= filtered.length) currentIndex = filtered.length - 1;
    if (currentIndex < 0) currentIndex = 0;

    const card = filtered[currentIndex];
    cardFrontTxt.textContent = card.front;
    cardBackTxt.textContent  = card.back;
    cardCounter.textContent  = `Card ${currentIndex + 1} of ${filtered.length}`;

    cardScene.classList.toggle('flipped', isFlipped);
    cardScene.classList.toggle('is-known', !!card.known);

    btnKnown.textContent = card.known ? '✓ Known — click to undo' : '✓ Mark as Known';
    btnKnown.classList.toggle('is-known', !!card.known);

    btnPrev.disabled = currentIndex === 0;
    btnNext.disabled = currentIndex === filtered.length - 1;

    renderList();
  }

  function renderList() {
    cardList.innerHTML = '';
    cards.forEach((c, i) => {
      const item = document.createElement('div');
      item.className = 'card-list-item' + (c.known ? ' known' : '');
      item.innerHTML = `
        <div class="known-dot"></div>
        <span class="q">${escHtml(c.front)}</span>
        <span class="sep">→</span>
        <span class="a${answersRevealed ? '' : ' hidden'}" data-i="${i}">${escHtml(c.back)}</span>
        <button class="btn-delete" data-i="${i}" title="Delete">✕</button>
      `;
      cardList.appendChild(item);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Add Card ──
  function addCard() {
    const front = inputFront.value.trim();
    const back  = inputBack.value.trim();
    if (!front || !back) { showToast('Fill in both sides first.'); return; }
    cards.push({ front, back, known: false });
    currentIndex = getFiltered().length - 1;
    isFlipped = false;
    inputFront.value = '';
    inputBack.value  = '';
    inputFront.focus();
    render();
    showToast('Card added!');
  }

  // ── Navigation ──
  function goNext() {
    if (currentIndex < getFiltered().length - 1) {
      currentIndex++;
      isFlipped = false;
      render();
    }
  }
  function goPrev() {
    if (currentIndex > 0) {
      currentIndex--;
      isFlipped = false;
      render();
    }
  }
  function flipCard() {
    if (getFiltered().length === 0) return;
    isFlipped = !isFlipped;
    cardScene.classList.toggle('flipped', isFlipped);
  }
  function shuffleDeck() {
    if (cards.length < 2) return;
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    currentIndex = 0;
    isFlipped = false;
    render();
    showToast('Deck shuffled!');
  }
  function resetDeck() {
    currentIndex = 0;
    isFlipped = false;
    render();
    showToast('Back to card 1.');
  }
  function deleteCard(i) {
    cards.splice(i, 1);
    const f = getFiltered();
    if (currentIndex >= f.length) currentIndex = Math.max(0, f.length - 1);
    isFlipped = false;
    render();
    showToast('Card deleted.');
  }
  function toggleKnown() {
    const filtered = getFiltered();
    if (filtered.length === 0) return;
    const card = filtered[currentIndex];
    const realIdx = cards.indexOf(card);
    cards[realIdx].known = !cards[realIdx].known;
    showToast(cards[realIdx].known ? '✓ Marked as known!' : 'Moved back to learning.');
    render();
  }

  // ── Dark mode ──
  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    btnTheme.textContent = isDark ? '🌙' : '☀️';
  }

  // ── Reveal answers ──
  function toggleReveal() {
    answersRevealed = !answersRevealed;
    btnRevealToggle.textContent = answersRevealed ? '🙈 Hide answers' : '👁 Reveal answers';
    renderList();
  }

  // ── Event Listeners ──
  btnAdd.addEventListener('click', addCard);
  inputFront.addEventListener('keydown', e => { if (e.key === 'Enter') inputBack.focus(); });
  inputBack.addEventListener('keydown',  e => { if (e.key === 'Enter') addCard(); });
  btnNext.addEventListener('click', goNext);
  btnPrev.addEventListener('click', goPrev);
  cardScene.addEventListener('click', flipCard);
  btnShuffle.addEventListener('click', shuffleDeck);
  btnReset.addEventListener('click', resetDeck);
  btnKnown.addEventListener('click', toggleKnown);
  btnTheme.addEventListener('click', toggleTheme);
  btnRevealToggle.addEventListener('click', toggleReveal);

  // Filter buttons
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.filter;
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentIndex = 0;
      isFlipped = false;
      render();
    });
  });

  // Click a blurred answer to peek at it for 2.5s
  cardList.addEventListener('click', e => {
    const answerEl = e.target.closest('.a.hidden');
    if (answerEl) {
      answerEl.classList.remove('hidden');
      setTimeout(() => { if (!answersRevealed) answerEl.classList.add('hidden'); }, 2500);
      return;
    }
    const del = e.target.closest('.btn-delete');
    if (del) deleteCard(parseInt(del.dataset.i));
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goPrev();
    if (e.key === ' ') { e.preventDefault(); flipCard(); }
    if (e.key === 'k' || e.key === 'K') toggleKnown();
  });

  render();
</script>
</body>
</html>
