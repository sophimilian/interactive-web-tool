<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #fffdf8;
      --card-front: #fffdf8;
      --card-back: #1a1a2e;
      --ink: #1a1a2e;
      --ink-muted: #7a7a8a;
      --accent: #e84855;
      --accent2: #3a86ff;
      --border: #d8d0c0;
      --shadow: rgba(26,26,46,0.10);
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 1rem;
    }
    header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    header h1 span { color: var(--accent); font-style: italic; }
    .deck-count {
      font-size: 0.75rem;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Add Form ── */
    .add-form {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2.5rem;
      box-shadow: 3px 3px 0 var(--border);
    }
    .add-form h2 {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 1rem;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .form-row input {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 3px;
      padding: 0.6rem 0.8rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-row input:focus { border-color: var(--ink); }
    .form-row input::placeholder { color: var(--ink-muted); }
    .btn-add {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 3px;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-add:hover { background: var(--accent); }
    .btn-add:active { transform: scale(0.97); }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ink-muted);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      line-height: 1.8;
      display: none;
    }
    .empty-state.visible { display: block; }
    .empty-state .big { font-family: 'Instrument Serif', serif; font-size: 3rem; display: block; margin-bottom: 0.5rem; color: var(--border); }

    /* ── Card Viewer ── */
    .viewer { display: none; }
    .viewer.visible { display: block; }

    .card-counter {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-align: center;
      margin-bottom: 1rem;
    }

    /* 3D flip */
    .card-scene {
      perspective: 900px;
      height: 240px;
      margin-bottom: 1.25rem;
      cursor: pointer;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-scene.flipped .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: 4px 4px 0 var(--border);
      border: 1.5px solid var(--border);
    }
    .card-front {
      background: var(--card-front);
    }
    .card-back {
      background: var(--card-back);
      color: #f5f0e8;
      transform: rotateY(180deg);
    }
    .card-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 0.75rem;
    }
    .card-text {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem;
      text-align: center;
      line-height: 1.4;
    }
    .card-hint {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.3;
      margin-top: 1.25rem;
    }
    .card-back .card-hint { opacity: 0.25; }

    /* ── Nav Buttons ── */
    .nav-row {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }
    .btn-nav {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--surface);
      color: var(--ink);
      border: 1.5px solid var(--border);
      border-radius: 3px;
      padding: 0.55rem 1.1rem;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 2px 2px 0 var(--border);
    }
    .btn-nav:hover { border-color: var(--ink); box-shadow: 2px 2px 0 var(--ink); }
    .btn-nav:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    .btn-nav.shuffle { color: var(--accent2); border-color: var(--accent2); box-shadow: 2px 2px 0 var(--accent2); }
    .btn-nav.shuffle:hover { background: var(--accent2); color: #fff; }
    .btn-nav.reset { color: var(--accent); border-color: var(--accent); box-shadow: 2px 2px 0 var(--accent); }
    .btn-nav.reset:hover { background: var(--accent); color: #fff; }

    /* ── Card List ── */
    .list-section h2 {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.75rem;
    }
    .card-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .card-list-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 3px;
      padding: 0.65rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-list-item .q { flex: 1; color: var(--ink); }
    .card-list-item .sep { color: var(--border); }
    .card-list-item .a { flex: 1; color: var(--ink-muted); font-style: italic; }
    .btn-delete {
      background: none;
      border: none;
      color: var(--ink-muted);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.1rem 0.3rem;
      border-radius: 2px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .btn-delete:hover { color: var(--accent); background: #ffeaec; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--bg);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      padding: 0.55rem 1.2rem;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Flash<span>cards</span></h1>
    <span class="deck-count" id="deckCount">0 cards</span>
  </header>

  <!-- Add Form -->
  <div class="add-form">
    <h2>New Card</h2>
    <div class="form-row">
      <input type="text" id="inputFront" placeholder="Question / term" />
      <input type="text" id="inputBack"  placeholder="Answer / definition" />
    </div>
    <button class="btn-add" id="btnAdd">+ Add Card</button>
  </div>

  <!-- Empty state -->
  <div class="empty-state visible" id="emptyState">
    <span class="big">✦</span>
    Add your first card above<br>to start studying.
  </div>

  <!-- Card Viewer -->
  <div class="viewer" id="viewer">
    <div class="card-counter" id="cardCounter">Card 1 of 1</div>

    <div class="card-scene" id="cardScene">
      <div class="card-inner" id="cardInner">
        <div class="card-face card-front">
          <span class="card-label">Question</span>
          <p class="card-text" id="cardFrontText"></p>
          <span class="card-hint">click to flip</span>
        </div>
        <div class="card-face card-back">
          <span class="card-label">Answer</span>
          <p class="card-text" id="cardBackText"></p>
          <span class="card-hint">click to flip back</span>
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn-nav" id="btnPrev">← Prev</button>
      <button class="btn-nav shuffle" id="btnShuffle">⇄ Shuffle</button>
      <button class="btn-nav" id="btnNext">Next →</button>
      <button class="btn-nav reset" id="btnReset">↺ Reset</button>
    </div>
  </div>

  <!-- Card List -->
  <div class="list-section" id="listSection" style="display:none">
    <h2>Your Deck</h2>
    <div class="card-list" id="cardList"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let cards = [];
  let currentIndex = 0;
  let isFlipped = false;

  // ── Elements ──
  const inputFront   = document.getElementById('inputFront');
  const inputBack    = document.getElementById('inputBack');
  const btnAdd       = document.getElementById('btnAdd');
  const btnPrev      = document.getElementById('btnPrev');
  const btnNext      = document.getElementById('btnNext');
  const btnShuffle   = document.getElementById('btnShuffle');
  const btnReset     = document.getElementById('btnReset');
  const cardScene    = document.getElementById('cardScene');
  const cardFrontTxt = document.getElementById('cardFrontText');
  const cardBackTxt  = document.getElementById('cardBackText');
  const cardCounter  = document.getElementById('cardCounter');
  const deckCount    = document.getElementById('deckCount');
  const emptyState   = document.getElementById('emptyState');
  const viewer       = document.getElementById('viewer');
  const cardList     = document.getElementById('cardList');
  const listSection  = document.getElementById('listSection');
  const toastEl      = document.getElementById('toast');

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
  }

  // ── Render ──
  function render() {
    const total = cards.length;
    deckCount.textContent = total + (total === 1 ? ' card' : ' cards');

    if (total === 0) {
      emptyState.classList.add('visible');
      viewer.classList.remove('visible');
      listSection.style.display = 'none';
      return;
    }

    emptyState.classList.remove('visible');
    viewer.classList.add('visible');
    listSection.style.display = 'block';

    // clamp index
    if (currentIndex >= total) currentIndex = total - 1;

    const card = cards[currentIndex];
    cardFrontTxt.textContent = card.front;
    cardBackTxt.textContent  = card.back;
    cardCounter.textContent  = `Card ${currentIndex + 1} of ${total}`;

    // flip state
    if (isFlipped) {
      cardScene.classList.add('flipped');
    } else {
      cardScene.classList.remove('flipped');
    }

    btnPrev.disabled = currentIndex === 0;
    btnNext.disabled = currentIndex === total - 1;

    // rebuild list
    cardList.innerHTML = '';
    cards.forEach((c, i) => {
      const item = document.createElement('div');
      item.className = 'card-list-item';
      item.innerHTML = `
        <span class="q">${escHtml(c.front)}</span>
        <span class="sep">→</span>
        <span class="a">${escHtml(c.back)}</span>
        <button class="btn-delete" data-i="${i}" title="Delete">✕</button>
      `;
      cardList.appendChild(item);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Add Card ──
  function addCard() {
    const front = inputFront.value.trim();
    const back  = inputBack.value.trim();
    if (!front || !back) {
      showToast('Fill in both sides first.');
      return;
    }
    cards.push({ front, back });
    currentIndex = cards.length - 1;
    isFlipped = false;
    inputFront.value = '';
    inputBack.value  = '';
    inputFront.focus();
    render();
    showToast('Card added!');
  }

  // ── Navigation ──
  function goNext() {
    if (currentIndex < cards.length - 1) {
      currentIndex++;
      isFlipped = false;
      render();
    }
  }

  function goPrev() {
    if (currentIndex > 0) {
      currentIndex--;
      isFlipped = false;
      render();
    }
  }

  function flipCard() {
    if (cards.length === 0) return;
    isFlipped = !isFlipped;
    render();
  }

  function shuffleDeck() {
    if (cards.length < 2) return;
    // Fisher-Yates shuffle
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    currentIndex = 0;
    isFlipped = false;
    render();
    showToast('Deck shuffled!');
  }

  function resetDeck() {
    currentIndex = 0;
    isFlipped = false;
    render();
    showToast('Back to card 1.');
  }

  function deleteCard(i) {
    cards.splice(i, 1);
    if (currentIndex >= cards.length) currentIndex = cards.length - 1;
    if (currentIndex < 0) currentIndex = 0;
    isFlipped = false;
    render();
    showToast('Card deleted.');
  }

  // ── Event Listeners ──
  btnAdd.addEventListener('click', addCard);

  // Allow Enter key to add card from either input
  inputFront.addEventListener('keydown', e => { if (e.key === 'Enter') inputBack.focus(); });
  inputBack.addEventListener('keydown',  e => { if (e.key === 'Enter') addCard(); });

  btnNext.addEventListener('click', goNext);
  btnPrev.addEventListener('click', goPrev);
  cardScene.addEventListener('click', flipCard);
  btnShuffle.addEventListener('click', shuffleDeck);
  btnReset.addEventListener('click', resetDeck);

  // Keyboard shortcuts: arrow keys to navigate, space to flip
  document.addEventListener('keydown', e => {
    if (['INPUT'].includes(e.target.tagName)) return;
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goPrev();
    if (e.key === ' ') { e.preventDefault(); flipCard(); }
  });

  // Delete buttons (event delegation)
  cardList.addEventListener('click', e => {
    const btn = e.target.closest('.btn-delete');
    if (btn) deleteCard(parseInt(btn.dataset.i));
  });

  // ── Init ──
  render();
</script>
</body>
</html>
